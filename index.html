<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📡 Big Model Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
  <link rel="alternate" type="application/rss+xml" title="Big Model Radar RSS" href="./feed.xml">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <style>
    :root {
      --bg:         #0B0D14;
      --bg-side:    #080A10;
      --bg-hover:   #12151F;
      --bg-active:  #1A1E2E;
      --border:     #1E2235;
      --text:       #C9D1D9;
      --muted:      #636E82;
      --dim:        #2E3547;
      --accent:     #E8A03D;
      --accent-bg:  rgba(232,160,61,0.10);
      --code-bg:    #0D1017;
      --link:       #79B8FF;
    }
    [data-theme="light"] {
      --bg:         #FAFBFC;
      --bg-side:    #F0F2F5;
      --bg-hover:   #E8ECF1;
      --bg-active:  #DDE3EA;
      --border:     #D2D8E0;
      --text:       #1C1E26;
      --muted:      #5A6678;
      --dim:        #B8C2D0;
      --accent:     #B57200;
      --accent-bg:  rgba(181,114,0,0.08);
      --code-bg:    #F0F2F5;
      --link:       #0451A5;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Space Mono', 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    #hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 50px;
      background: var(--bg-side); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .brand { font-size: 14px; font-weight: 700; letter-spacing: -0.03em; display: flex; align-items: center; gap: 10px; }
    .brand-icon { font-size: 18px; animation: breathe 3s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:0.55} }
    .brand em { color: var(--accent); font-style: normal; }
    .hdr-right { display: flex; align-items: center; gap: 14px; }
    .signal {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 6px var(--accent);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
    #themeBtn, #rssLink {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 4px 12px; border-radius: 4px; cursor: pointer;
      font-family: inherit; font-size: 10px; letter-spacing: 0.06em;
      text-decoration: none; display: inline-block;
      transition: border-color 0.15s, color 0.15s;
    }
    #themeBtn:hover, #rssLink:hover, .lang-select:hover { border-color: var(--accent); color: var(--accent); }
    .lang-select {
      background: var(--bg); border: 1px solid var(--border); color: var(--muted);
      padding: 4px 8px; border-radius: 4px; cursor: pointer;
      font-family: inherit; font-size: 10px; letter-spacing: 0.06em;
      transition: border-color 0.15s, color 0.15s;
      text-transform: uppercase;
    }
    .lang-select:focus { outline: none; border-color: var(--accent); }
    .lang-select option { background: var(--bg); color: var(--text); }

    /* ── Body ── */
    #body { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: 222px; flex-shrink: 0;
      background: var(--bg-side); border-right: 1px solid var(--border);
      overflow-y: auto; padding: 10px 0;
    }
    #sidebar::-webkit-scrollbar { width: 3px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
    .side-label {
      font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--dim); padding: 4px 16px 10px;
    }
    .search-wrap { padding: 0 12px 10px; }
    #searchInput {
      width: 100%; height: 28px; padding: 0 9px;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--bg); color: var(--text);
      font-family: inherit; font-size: 11px;
    }
    #searchInput:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-bg);
    }
    #searchStatus {
      min-height: 14px; margin-top: 4px;
      font-size: 9px; letter-spacing: 0.04em; color: var(--dim);
    }
    .date-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 14px; cursor: pointer;
      font-size: 11px; font-weight: 700; color: var(--muted);
      letter-spacing: 0.04em; transition: color 0.15s; user-select: none;
    }
    .date-hdr:hover { color: var(--text); }
    .date-hdr.lit { color: var(--accent); }
    .date-hdr.search-hit {
      color: var(--accent);
      background: linear-gradient(90deg, var(--accent-bg), transparent);
    }
    .arr { font-size: 8px; transition: transform 0.2s; display: inline-block; }
    .date-group.open .arr { transform: rotate(90deg); }
    .rpt-list { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
    .date-group.open .rpt-list { max-height: 400px; }
    .rpt-btn {
      display: block; width: 100%; padding: 5px 14px 5px 26px;
      background: none; border: none; border-left: 2px solid transparent;
      text-align: left; cursor: pointer; font-family: inherit; font-size: 11px;
      color: var(--muted); transition: color 0.1s, background 0.1s, border-color 0.1s;
    }
    .rpt-btn:hover { background: var(--bg-hover); color: var(--text); }
    .rpt-btn.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-bg); }
    .rpt-row { display: flex; align-items: center; padding: 5px 14px 5px 26px; }
    .rpt-label { flex: 1; font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    /* ── Content ── */
    #cwrap { flex: 1; overflow-y: auto; }
    #cwrap::-webkit-scrollbar { width: 5px; }
    #cwrap::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }
    #content { max-width: 820px; margin: 0 auto; padding: 36px 48px 72px; }

    .msg {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px;
      height: 240px; color: var(--muted); font-size: 11px; letter-spacing: 0.05em;
    }
    .msg-icon { font-size: 36px; opacity: 0.35; }

    @keyframes fadein { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
    .fade { animation: fadein 0.3s ease; }

    /* ── Markdown ── */
    .md {
      font-family: 'Source Serif 4', Georgia, 'PingFang SC', 'Microsoft YaHei', serif;
      font-size: 16px; line-height: 1.8; color: var(--text);
    }
    .md h1 { font-size: 22px; font-weight: 600; margin-bottom: 20px; line-height: 1.3; letter-spacing: -0.02em; }
    .md h2 { font-size: 17px; font-weight: 600; margin: 30px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .md h3 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; }
    .md h4 { font-size: 13px; font-weight: 700; margin: 16px 0 6px; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 0.03em; }
    .md p { margin-bottom: 12px; }
    .md a { color: var(--link); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md strong { font-weight: 600; }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 22px 0; }
    .md ul, .md ol { padding-left: 22px; margin-bottom: 12px; }
    .md li { margin-bottom: 4px; }
    .md li > ul, .md li > ol { margin-top: 4px; margin-bottom: 0; }
    .md blockquote { border-left: 3px solid var(--accent); padding: 6px 16px; margin: 12px 0; color: var(--muted); font-style: italic; }
    .md code {
      font-family: 'Space Mono', monospace; font-size: 12.5px;
      background: var(--code-bg); border: 1px solid var(--border);
      padding: 1px 6px; border-radius: 3px;
    }
    .md pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 16px; overflow-x: auto; margin: 14px 0; }
    .md pre code { background: none; border: none; padding: 0; font-size: 12px; }
    .md table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13px; font-family: 'Space Mono', monospace; }
    .md th { background: var(--code-bg); border: 1px solid var(--border); padding: 7px 12px; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
    .md td { border: 1px solid var(--border); padding: 7px 12px; vertical-align: top; }
    .md tr:nth-child(even) td { background: var(--bg-hover); }
    .md details { border: 1px solid var(--border); border-radius: 6px; margin: 10px 0; overflow: hidden; }
    .md summary {
      cursor: pointer; padding: 8px 14px;
      font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted);
      background: var(--code-bg); user-select: none; list-style: none;
      display: flex; align-items: center; gap: 8px; transition: color 0.15s;
    }
    .md summary::-webkit-details-marker { display: none; }
    .md summary::before { content: '▶'; font-size: 8px; flex-shrink: 0; }
    .md details[open] summary::before { content: '▼'; }
    .md summary:hover { color: var(--text); }
    .md details > *:not(summary) { padding: 12px 14px; }

    /* ── Mobile ── */
    #mob-toggle { display: none; }
    @media (max-width: 680px) {
      body { overflow: auto; }
      #app { height: auto; min-height: 100vh; }
      #body { flex-direction: column; overflow: visible; }
      #cwrap { overflow: visible; }
      #sidebar {
        width: 100%; border-right: none; border-bottom: 1px solid var(--border);
        max-height: 48px; overflow: hidden; padding: 0;
        transition: max-height 0.3s ease;
      }
      #sidebar.open { max-height: 60vh; overflow-y: auto; padding: 0 0 8px; }
      #mob-toggle {
        display: flex; align-items: center; gap: 8px;
        height: 48px; padding: 0 16px; cursor: pointer;
        font-size: 11px; color: var(--muted); border-bottom: 1px solid transparent;
        transition: color 0.15s;
      }
      #mob-toggle:hover { color: var(--text); }
      #sidebar.open #mob-toggle { border-bottom-color: var(--border); }
      .side-label { margin-top: 8px; }
      #content { padding: 20px 16px 48px; }
      .md { font-size: 15px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="brand">
      <span class="brand-icon">📡</span>
      <span>agents-<em>radar</em></span>
    </div>
    <div class="hdr-right">
      <div class="signal"></div>
      <select id="langSelect" class="lang-select" title="Language"></select>
      <a id="rssLink" href="./feed.xml" title="RSS Feed">⊕ RSS</a>
      <button id="themeBtn">◐ LIGHT</button>
    </div>
  </div>

  <div id="body">
    <div id="sidebar">
      <div id="mob-toggle">
        ☰ <span id="mobLabel">选择报告</span>
      </div>
      <div class="side-label">REPORTS</div>
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="Search full text...">
        <div id="searchStatus"></div>
      </div>
      <div id="nav"></div>
    </div>

    <div id="cwrap">
      <div id="content">
        <div class="msg"><div class="msg-icon">📡</div><div>正在加载…</div></div>
      </div>
    </div>
  </div>
</div>

<script>
marked.use({ breaks: true, gfm: true });

DOMPurify.addHook('uponSanitizeElement', (node, data) => {
  if (data.tagName === 'details' || data.tagName === 'summary') {
    data.allowedTags[data.tagName] = true;
  }
});

function renderMarkdown(raw) {
  const html = marked.parse(raw);
  return DOMPurify.sanitize(html, {
    ADD_TAGS: ['details', 'summary'],
    ADD_ATTR: ['open'],
  });
}

// ── UI locale strings ──
const UI = {
  en: {
    mobLabel: 'Reports',
    loading: 'Loading...',
    searchPlaceholder: 'Search full text...',
    searchBuilding: 'Building index…',
    searchMatched: (n) => `Matched ${n} days`,
    errorManifest: 'Could not load manifest.json',
  },
  zh: {
    mobLabel: '选择报告',
    loading: '正在加载…',
    searchPlaceholder: '搜索全文...',
    searchBuilding: '正在建立索引…',
    searchMatched: (n) => `匹配到 ${n} 天`,
    errorManifest: '无法加载 manifest.json',
  },
};
function ui(key, lang) { return UI[lang]?.[key] ?? UI.en[key]; }

// ── Report label fallback ──
const LABELS = {
  'ai-cli':          'AI CLI Tools',
  'ai-agents':       'AI Agents Ecosystem',
  'ai-web':          'OpenAI & Anthropic Updates',
  'ai-trending':     'GitHub AI Trends',
  'ai-hn':           'HN Community Digest',
};

// ── Theme ──
const htmlEl = document.documentElement;
const themeBtn = document.getElementById('themeBtn');
let theme = localStorage.getItem('ar-theme') || 'dark';

function applyTheme(t) {
  theme = t;
  htmlEl.dataset.theme = t;
  themeBtn.textContent = t === 'dark' ? '◐ LIGHT' : '● DARK';
  localStorage.setItem('ar-theme', t);
}
applyTheme(theme);
themeBtn.onclick = () => applyTheme(theme === 'dark' ? 'light' : 'dark');

// ── State ──
let currentKey = null;
let currentLang = 'en';
let manifestData = null;
let searchIndex = null;
let searchReady = false;
let searchQuery = '';
let searchDebounce = null;

const searchInput = document.getElementById('searchInput');
const searchStatus = document.getElementById('searchStatus');
const langSelect = document.getElementById('langSelect');
const mobLabel = document.getElementById('mobLabel');
const mobToggle = document.getElementById('mob-toggle');

mobToggle.onclick = () => document.getElementById('sidebar').classList.toggle('open');

function setSearchStatus(text) {
  searchStatus.textContent = text || '';
}

function reportFilename(reportId, lang) {
  return lang === 'en' ? `${reportId}.md` : `${reportId}.${lang}.md`;
}

function reportLabel(reportId, lang) {
  return manifestData?.labels?.[lang]?.[reportId] || LABELS[reportId] || reportId;
}

// ── Normalize manifest (handle old format without langs/labels) ──
function normalizeManifest(raw) {
  const langs = raw.langs || { en: 'English' };
  const labels = raw.labels || { en: Object.fromEntries(Object.keys(LABELS).map(k => [k, LABELS[k]])) };
  const dates = (raw.dates || []).map((d) => {
    if (!d.reports.length) return null;
    const reports = d.reports.map((r) => {
      if (typeof r === 'string') return { id: r, langs: ['en'] };
      return r;
    });
    return { ...d, reports };
  }).filter(Boolean);
  return { ...raw, langs, labels, dates };
}

// ── Language ──
function rebuildUI() {
  const lang = currentLang;

  // Update chrome text
  mobLabel.textContent = ui('mobLabel', lang);
  searchInput.placeholder = ui('searchPlaceholder', lang);

  // Populate lang selector (only if we have manifest data)
  if (manifestData) {
    langSelect.innerHTML = Object.entries(manifestData.langs)
      .map(([code, name]) => `<option value="${code}"${code === lang ? ' selected' : ''}>${name}</option>`)
      .join('');
  }

  // Rebuild sidebar filtered by current language
  document.getElementById('nav').innerHTML = '';
  buildNav(manifestData.dates, lang);
  initSearch(manifestData.dates, lang);

  // Try to load the same report in the new language
  const hash = getHash();
  if (hash && hash.lang === lang) {
    loadReport(hash.date, lang, hash.report, false);
    return;
  }

  // Find current date in nav or first date with any report in this language
  const currentParts = currentKey ? currentKey.split('/') : [];
  const currentDate = currentParts.length >= 2 ? currentParts[0] : null;
  const currentReport = currentParts.length >= 3 ? currentParts[2] : null;

  let targetDate = null;
  let targetReport = null;

  if (currentDate && currentReport) {
    const dateEntry = manifestData.dates.find(d => d.date === currentDate);
    if (dateEntry) {
      const rep = dateEntry.reports.find(r => r.id === currentReport);
      if (rep && rep.langs.includes(lang)) {
        targetDate = currentDate;
        targetReport = currentReport;
      }
    }
  }

  if (!targetDate) {
    const first = manifestData.dates.find(d => d.reports.some(r => r.langs.includes(lang)));
    if (first) {
      targetDate = first.date;
      targetReport = first.reports.find(r => r.langs.includes(lang))?.id;
    }
  }

  if (targetDate && targetReport) {
    history.replaceState(null, '', `#${targetDate}/${lang}/${targetReport}`);
    loadReport(targetDate, lang, targetReport, false);
  }
}

function setLang(lang) {
  if (lang === currentLang || !manifestData?.langs[lang]) return;
  currentLang = lang;
  localStorage.setItem('ar-lang', lang);
  rebuildUI();
}

langSelect.addEventListener('change', (e) => setLang(e.target.value));

// ── Routing ──
function getHash() {
  const parts = location.hash.slice(1).split('/');
  if (parts.length >= 3 && /^\d{4}-\d{2}-\d{2}$/.test(parts[0])) {
    return { date: parts[0], lang: parts[1] || 'en', report: parts[2] };
  }
  if (parts.length >= 2 && /^\d{4}-\d{2}-\d{2}$/.test(parts[0])) {
    return { date: parts[0], lang: currentLang, report: parts[1] };
  }
  return null;
}

// ── Search ──
function applyDateSearch(query) {
  const needle = query.trim().toLowerCase();
  let hits = 0;

  document.querySelectorAll('.date-group').forEach((grp) => {
    const hdr = grp.querySelector('.date-hdr');
    if (!hdr) return;

    if (!needle || !searchIndex) {
      hdr.classList.remove('search-hit');
      return;
    }

    const text = searchIndex.get(grp.dataset.date) || '';
    const matched = text.includes(needle);
    hdr.classList.toggle('search-hit', matched);
    if (matched) hits += 1;
  });

  if (!needle) {
    setSearchStatus('');
  } else if (!searchReady) {
    setSearchStatus(ui('searchBuilding', currentLang));
  } else {
    setSearchStatus(ui('searchMatched', currentLang)(hits));
  }
}

async function buildSearchIndex(dates, lang) {
  const index = new Map();
  await Promise.all(
    dates.map(async ({ date, reports }) => {
      const chunks = await Promise.all(
        reports.map(async (r) => {
          if (!r.langs.includes(lang)) return '';
          try {
            const res = await fetch(`./digests/${date}/${reportFilename(r.id, lang)}`);
            if (!res.ok) return '';
            return await res.text();
          } catch {
            return '';
          }
        })
      );
      index.set(date, chunks.join('\n').toLowerCase());
    })
  );
  return index;
}

function initSearch(dates, lang) {
  searchReady = false;
  setSearchStatus(ui('searchBuilding', lang));

  buildSearchIndex(dates, lang).then((index) => {
    searchIndex = index;
    searchReady = true;
    applyDateSearch(searchQuery);
    if (!searchQuery.trim()) setSearchStatus('');
  });
}

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => applyDateSearch(searchQuery), 120);
});

function setContent(html) {
  document.getElementById('content').innerHTML = html;
}

// ── loadReport ──
async function loadReport(date, lang, report, push = true) {
  const key = `${date}/${lang}/${report}`;
  if (key === currentKey) return;
  currentKey = key;

  if (push) history.pushState(null, '', `#${key}`);

  // Sync sidebar
  document.querySelectorAll('.rpt-btn').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  document.querySelectorAll('.date-hdr').forEach(h => {
    const grp = h.closest('.date-group');
    const hasActive = grp.querySelector('.rpt-btn.active');
    h.classList.toggle('lit', !!hasActive);
  });
  document.querySelectorAll('.date-group').forEach(g => {
    if (g.dataset.date === date) g.classList.add('open');
  });

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');

  const cwrap = document.getElementById('cwrap');
  setContent(`<div class="msg"><div class="msg-icon">⏳</div><div>${ui('loading', lang)}</div></div>`);
  cwrap.scrollTop = 0;

  try {
    const filename = reportFilename(report, lang);
    const res = await fetch(`./digests/${date}/${filename}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.text();
    const safe = renderMarkdown(raw);
    setContent(`<div class="md fade">${safe}</div>`);
  } catch (e) {
    setContent(`<div class="msg"><div class="msg-icon">⚠️</div><div>${ui('loading', lang)}: ${e.message}</div></div>`);
  }
}

// ── buildNav ──
function buildNav(dates, lang) {
  const nav = document.getElementById('nav');
  dates.forEach(({ date, reports }, i) => {
    // Filter reports by language availability
    const avail = reports.filter(r => r.langs.includes(lang));
    if (!avail.length) return;

    const grp = document.createElement('div');
    grp.className = 'date-group' + (i === 0 ? ' open' : '');
    grp.dataset.date = date;

    const hdr = document.createElement('div');
    hdr.className = 'date-hdr';
    const dateText = document.createTextNode(date + '\u00a0');
    const arrSpan = document.createElement('span');
    arrSpan.className = 'arr';
    arrSpan.textContent = '▶';
    hdr.appendChild(dateText);
    hdr.appendChild(arrSpan);
    hdr.onclick = () => grp.classList.toggle('open');

    const list = document.createElement('div');
    list.className = 'rpt-list';

    avail.forEach(r => {
      const btn = document.createElement('button');
      btn.className = 'rpt-btn';
      btn.dataset.key = `${date}/${lang}/${r.id}`;
      btn.textContent = reportLabel(r.id, lang);
      btn.onclick = () => loadReport(date, lang, r.id);
      list.appendChild(btn);
    });

    grp.append(hdr, list);
    nav.appendChild(grp);
  });
}

window.addEventListener('popstate', () => {
  const h = getHash();
  if (h) {
    currentLang = h.lang;
    loadReport(h.date, h.lang, h.report, false);
  }
});

// ── Init ──
(async () => {
  try {
    const res = await fetch('./manifest.json');
    if (!res.ok) throw new Error('manifest.json not found');
    const raw = await res.json();
    manifestData = normalizeManifest(raw);
    if (!manifestData.dates?.length) throw new Error('manifest is empty');

    // Determine initial language
    const hash = getHash();
    const savedLang = localStorage.getItem('ar-lang');
    let initLang = 'en';
    if (hash && manifestData.langs[hash.lang]) {
      initLang = hash.lang;
    } else if (savedLang && manifestData.langs[savedLang]) {
      initLang = savedLang;
    }
    currentLang = initLang;

    rebuildUI();

    // Load initial report from hash or first available
    const h = getHash();
    if (h && manifestData.langs[h.lang]) {
      const dateEntry = manifestData.dates.find(d => d.date === h.date);
      const rep = dateEntry?.reports.find(r => r.id === h.report);
      if (rep && rep.langs.includes(h.lang)) {
        loadReport(h.date, h.lang, h.report, false);
        return;
      }
    }

    // First report in current language
    const first = manifestData.dates.find(d => d.reports.some(r => r.langs.includes(currentLang)));
    if (first) {
      const r0 = first.reports.find(r => r.langs.includes(currentLang));
      history.replaceState(null, '', `#${first.date}/${currentLang}/${r0.id}`);
      loadReport(first.date, currentLang, r0.id, false);
    }
  } catch (e) {
    document.getElementById('nav').innerHTML =
      '<div class="msg" style="height:80px;font-size:10px">⚠️ ' + e.message + '</div>';
    setContent(`<div class="msg"><div class="msg-icon">📡</div><div>${ui('errorManifest', 'en')}</div></div>`);
  }
})();
</script>
</body>
</html>
